name: Validation

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  json-validation:
    runs-on: ubuntu-latest

    env:
      SCHEMA_LOCATION: "${{ github.workspace }}/schema.json"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@7dc13c20e2bf541b8a77fa1320a04983b18846f6 #v1.6.0

      - run: npm ci --ignore-scripts

      - name: Download schema
        run: curl --fail --silent --show-error https://raw.githubusercontent.com/ministryofjustice/hmpps-digital-prison-reporting-data-product-definitions-schema/refs/heads/main/schema/1.0.0/data-product-definition-schema.json -o $SCHEMA_LOCATION

      - name: Validate all the DPDs against the JSON schema
        id: validate-json
        run: npm run validate

      - name: Ensure variant uniqueness within DPDs
        id: ensure-uniqueness
        run: npm run uniqueness
