name: Validation

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  json-validation:
    runs-on: ubuntu-latest

    env:
      SCHEMA_LOCATION: "${{ github.workspace }}/schema.json"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "24.x"

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@79b9f7c4bd0d3cb85d4f7a289a515a666d38322e

      - run: npm ci --ignore-scripts

      - name: Download schema
        run: curl --fail --silent --show-error https://raw.githubusercontent.com/ministryofjustice/hmpps-digital-prison-reporting-data-product-definitions-schema/main/schema/data-product-definition-schema.json -o $SCHEMA_LOCATION

      - name: Validate all the DPDs against the JSON schema
        id: validate-json
        run: npm run validate

      - name: Ensure variant uniqueness within DPDs
        id: ensure-uniqueness
        run: npm run uniqueness