name: Delete

on:
  workflow_dispatch:
    inputs:
      deployEnv:
        description: "Environment to delete a DPD from"
        required: true
        default: dev
        type: choice
        options:
          - dev
          - test
          - preprod
          - prod
      dpdId:
        description: "DPD ID"
        required: true
        type: text
      category:
        description: "DPD Category/Path"
        required: true
        type: text

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout

jobs:
  delete-dpd:
    name: Delete DPD from ${{ inputs.deployEnv }} env
    environment: ${{ inputs.deployEnv }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: "arn:aws:iam::${{ secrets.ACCOUNT_NUMBER }}:role/dpr-dpd-table-github-deploy-role"
          role-session-name: githubactionsrolesession
          aws-region: "eu-west-2"

      - name: Delete from DynamoDB
        shell: bash
        env:
          dpd_id: ${{ inputs.dpdId }}
          dpd_category: ${{ inputs.category }}
        run: |
          aws dynamodb delete-item \
            --table-name dpr-data-product-definition \
            --key "{ \"data-product-id\": { \"S\": \"$dpd_id\" }, \"category\": { \"S\": \"$dpd_category\" } }"
